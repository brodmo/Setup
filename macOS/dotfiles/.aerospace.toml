start-at-login = false
after-login-command = []
# run borders as a separate service to gracefully handle crashes
# after-startup-command = [
#   'exec-and-forget borders active_color=0xff61afef inactive_color=0xff7f848e width=8'
# ]

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 40

default-root-container-layout = 'accordion'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 4
outer.bottom = 4
outer.top = 4
outer.right = 4

[key-mapping]
preset = 'qwerty'

[mode.main.binding]
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab
ctrl-alt-shift-enter = '''exec-and-forget osascript -e '
    if application "iTerm" is not running then
        activate application "iTerm"
    else
        tell application "iTerm"
            create window with default profile
            activate
        end tell
    end if
    '
    '''

ctrl-alt-shift-cmd-q = 'move-workspace-to-monitor --wrap-around next'
ctrl-alt-shift-cmd-e = 'layout tiles accordion'

ctrl-alt-shift-backslash = 'split opposite'
ctrl-alt-shift-cmd-backslash = 'layout horizontal vertical'

ctrl-alt-shift-0 = 'reload-config'
ctrl-alt-shift-cmd-0 = 'flatten-workspace-tree'

ctrl-alt-shift-a = 'focus left --boundaries all-monitors-outer-frame'
ctrl-alt-shift-s = 'focus down --boundaries all-monitors-outer-frame'
ctrl-alt-shift-w = 'focus up --boundaries all-monitors-outer-frame'
ctrl-alt-shift-d = 'focus right --boundaries all-monitors-outer-frame'

ctrl-alt-shift-cmd-a = 'move left'
ctrl-alt-shift-cmd-s = 'move down'
ctrl-alt-shift-cmd-w = 'move up'
ctrl-alt-shift-cmd-d = 'move right'

ctrl-alt-shift-minus = 'resize smart -50'
ctrl-alt-shift-equal = 'resize smart +50'
ctrl-alt-shift-cmd-minus = 'resize smart-opposite -50'
ctrl-alt-shift-cmd-equal = 'resize smart-opposite +50'

ctrl-alt-shift-1 = 'workspace 1'
ctrl-alt-shift-2 = 'workspace 2'
ctrl-alt-shift-3 = 'workspace 3'
ctrl-alt-shift-4 = 'workspace 4'
ctrl-alt-shift-5 = 'workspace 5'
ctrl-alt-shift-cmd-1 = 'move-node-to-workspace 1'
ctrl-alt-shift-cmd-2 = 'move-node-to-workspace 2'
ctrl-alt-shift-cmd-3 = 'move-node-to-workspace 3'
ctrl-alt-shift-cmd-4 = 'move-node-to-workspace 4'
ctrl-alt-shift-cmd-5 = 'move-node-to-workspace 5'

ctrl-alt-shift-r = 'workspace P'                  # Pages -- web
ctrl-alt-shift-f = 'workspace T'                  # Thoughts -- notes
ctrl-alt-shift-c = 'workspace C'                  # Chats
ctrl-alt-shift-v = 'workspace V'                  # Vibes -- music
ctrl-alt-shift-x = 'workspace X'                  # Xtra monitor default -- scratchpad
ctrl-alt-shift-cmd-r = 'move-node-to-workspace P'
ctrl-alt-shift-cmd-f = 'move-node-to-workspace T'
ctrl-alt-shift-cmd-c = 'move-node-to-workspace C'
ctrl-alt-shift-cmd-v = 'move-node-to-workspace V'
ctrl-alt-shift-cmd-x = 'move-node-to-workspace X'

# Floating
[[on-window-detected]]
if.app-id = 'net.antelle.keeweb'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'layout floating'

# Dev
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace 2'
[[on-window-detected]]
if.app-id = 'com.jetbrains.pycharm'
run = 'move-node-to-workspace 2'
[[on-window-detected]]
if.app-id = 'com.jetbrains.webstorm'
run = 'move-node-to-workspace 2'

# Web
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace P'

# Notes
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace T'
[[on-window-detected]]
if.app-id = 'io.remnote'
run = 'move-node-to-workspace T'

# Chats
[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'move-node-to-workspace C'
[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace C'
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace C'

# Music
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace V'
[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'move-node-to-workspace V'


[workspace-to-monitor-force-assignment]
X = 'secondary'

